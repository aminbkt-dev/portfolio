<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="shape">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">
    <!-- Background -->
    <rect width="64" height="64" fill="#0f172a"/>

    <!-- Subtle bar chart — very discreet background detail -->
    <rect x="10" y="52" width="7" height="8"  rx="1.5" fill="#1d3a5c"/>
    <rect x="21" y="47" width="7" height="13" rx="1.5" fill="#1d3a5c"/>
    <rect x="32" y="50" width="7" height="10" rx="1.5" fill="#1d3a5c"/>
    <rect x="43" y="44" width="7" height="16" rx="1.5" fill="#1d3a5c"/>

    <!-- AB initials — dominant element -->
    <text
      x="32"
      y="36"
      text-anchor="middle"
      font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="-1.5"
      fill="white"
    >AB</text>
  </g>
</svg>
